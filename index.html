<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1022">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Math Arcade">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>Math Arcade</title>
<style>
  :root{
    --bg0:#141a3a; --bg1:#0b1022; --ink:#eaf1ff;
    --font:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:var(--font);background:var(--bg1);color:var(--ink);
    overflow:hidden;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
  }

  /* ---------- Home / launcher ---------- */
  #home{
    position:fixed;inset:0;overflow-y:auto;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(120,150,255,.22), transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
    display:flex;flex-direction:column;align-items:center;
    padding:calc(env(safe-area-inset-top) + clamp(20px,6vw,44px)) clamp(16px,5vw,40px) clamp(24px,7vw,48px);
    gap:clamp(16px,4vw,26px);
  }
  .brand{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .brand h1{
    margin:0;font-size:clamp(34px,10vw,64px);font-weight:800;line-height:.95;
    letter-spacing:.01em;text-shadow:0 4px 0 rgba(3,8,22,.55);text-wrap:balance;
  }
  .brand h1 .arc{color:#ffd24a}
  .brand p{margin:0;opacity:.8;font-size:clamp(13px,3.6vw,18px);text-wrap:balance}

  .grid{
    width:100%;max-width:640px;
    display:grid;grid-template-columns:repeat(2,1fr);
    gap:clamp(12px,3.2vw,20px);
  }
  .card{
    position:relative;cursor:pointer;border:none;
    font-family:var(--font);color:#fff;text-align:left;
    border-radius:22px;padding:clamp(14px,4vw,22px);
    min-height:clamp(140px,40vw,180px);
    display:flex;flex-direction:column;justify-content:space-between;gap:10px;
    box-shadow:0 8px 0 rgba(3,8,22,.35), 0 14px 30px rgba(3,8,22,.45);
    transition:transform .1s, box-shadow .1s;
    overflow:hidden;
  }
  .card:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(3,8,22,.35), 0 8px 16px rgba(3,8,22,.45)}
  .card .emoji{font-size:clamp(38px,12vw,56px);line-height:1;filter:drop-shadow(0 3px 0 rgba(0,0,0,.3))}
  .card .name{font-size:clamp(17px,5vw,24px);font-weight:800;line-height:1.05}
  .card .desc{font-size:clamp(11px,3.1vw,14px);opacity:.92;line-height:1.3}
  .card .play{
    align-self:flex-start;margin-top:2px;
    font-size:clamp(11px,3vw,13px);font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    background:rgba(255,255,255,.22);padding:6px 12px;border-radius:999px;
  }
  /* per-game themes */
  .card.fishing  {background:linear-gradient(150deg,#2b9fc0,#0a2a43)}
  .card.snake    {background:linear-gradient(150deg,#3fae63,#0c1b30)}
  .card.shooting {background:linear-gradient(150deg,#3f74a8,#0b1c30)}
  .card.maze     {background:linear-gradient(150deg,#5aa04a,#243a17)}

  .footnote{opacity:.55;font-size:clamp(11px,3vw,13px);text-align:center;text-wrap:balance}

  /* ---------- Game player (iframe) ---------- */
  #player{position:fixed;inset:0;background:#000;display:none}
  #player.open{display:block}
  #frame{width:100%;height:100%;border:0;display:block}
  #back{
    position:fixed;z-index:100;cursor:pointer;
    top:max(8px, env(safe-area-inset-top));
    left:max(8px, env(safe-area-inset-left));
    width:clamp(40px,10vw,48px);height:clamp(40px,10vw,48px);border-radius:50%;
    border:2px solid rgba(255,255,255,.45);
    background:rgba(8,12,26,.62);backdrop-filter:blur(4px);
    color:#fff;font-size:clamp(22px,6vw,28px);font-weight:800;line-height:1;
    display:none;place-items:center;padding:0 4px 3px 0;
  }
  #back.open{display:grid}
  #back:active{transform:scale(.94);background:rgba(8,12,26,.85)}
</style>
</head>
<body>
  <div id="home">
    <div class="brand">
      <h1>Math <span class="arc">Arcade</span> 🕹️</h1>
      <p>Four math mini-games in one. Pick a game to play!</p>
    </div>

    <div class="grid" id="grid">
      <button class="card fishing" data-game="games/fishing.html">
        <div class="emoji">🐟</div>
        <div class="name">Math Fishing</div>
        <div class="desc">Catch the fish with the correct answer</div>
        <div class="play">Play ›</div>
      </button>
      <button class="card snake" data-game="games/snake.html">
        <div class="emoji">🐍</div>
        <div class="name">Snake Math</div>
        <div class="desc">Eat the number that solves the problem</div>
        <div class="play">Play ›</div>
      </button>
      <button class="card shooting" data-game="games/shooting.html">
        <div class="emoji">✈️</div>
        <div class="name">Sky Math Squadron</div>
        <div class="desc">Shoot the plane with the answer</div>
        <div class="play">Play ›</div>
      </button>
      <button class="card maze" data-game="games/maze.html">
        <div class="emoji">🌲</div>
        <div class="name">Forest Path Maze</div>
        <div class="desc">Solve math to find your way out</div>
        <div class="play">Play ›</div>
      </button>
    </div>

    <div class="footnote">Grades K–5 • tap a game, then use the ‹ button to come back to this menu.</div>
  </div>

  <div id="player">
    <iframe id="frame" title="game" allow="autoplay; fullscreen"></iframe>
  </div>
  <button id="back" aria-label="Back to menu">‹</button>

  <script>
    (function(){
      "use strict";
      var home = document.getElementById('home');
      var player = document.getElementById('player');
      var frame = document.getElementById('frame');
      var back = document.getElementById('back');

      function openGame(src){
        frame.src = src;
        player.classList.add('open');
        back.classList.add('open');
        home.style.display = 'none';
      }
      function goHome(){
        player.classList.remove('open');
        back.classList.remove('open');
        frame.src = 'about:blank';   // unload the game (stops its loop/audio)
        home.style.display = 'flex';
      }

      var cards = document.querySelectorAll('.card');
      for(var i=0;i<cards.length;i++){
        cards[i].addEventListener('click', function(){ openGame(this.getAttribute('data-game')); });
      }
      back.addEventListener('click', goHome);

      // Android hardware/gesture back: if a game is open, return to the menu
      // instead of closing the whole app.
      window.addEventListener('popstate', function(){
        if(player.classList.contains('open')) goHome();
      });

      // Register the service worker so the app works offline once installed.
      if('serviceWorker' in navigator){
        window.addEventListener('load', function(){
          navigator.serviceWorker.register('sw.js').catch(function(){});
        });
      }
    })();
  </script>
</body>
</html>
