name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Parameters for this app.
env:
  APP_NAME: "Math Arcade"
  APP_ID: "com.jongha1618.matharcade"
  ARTIFACT: "math-arcade"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          cp -r games www/

      - name: Set up Capacitor project
        run: |
          npm init -y >/dev/null
          npm install --no-audit --no-fund \
            @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          npx cap init "$APP_NAME" "$APP_ID" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Build release APK (unsigned)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KS_B64" | base64 -d > release.jks
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          "$BT/zipalign" -f 4 "$UNSIGNED" aligned.apk
          "$BT/apksigner" sign --ks release.jks --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KS_PASS" --key-pass "pass:$KEY_PASS" \
            --out "${ARTIFACT}.apk" aligned.apk
          "$BT/apksigner" verify --print-certs "${ARTIFACT}.apk"
          rm -f release.jks aligned.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}-apk
          path: ${{ env.ARTIFACT }}.apk

      # Publish the signed APK to the PUBLIC download repo (no GitHub login needed
      # to download). Stable tag = a fixed URL that always has the newest build.
      - name: Publish APK to public download repo
        uses: softprops/action-gh-release@v2
        with:
          repository: jongha1618/game-apks
          token: ${{ secrets.APK_PUBLISH_TOKEN }}
          tag_name: ${{ env.ARTIFACT }}
          name: ${{ env.APP_NAME }}
          body: |
            Latest Android build of ${{ env.APP_NAME }} — all four math games in one app (build ${{ github.run_number }}).

            **Install on your phone:**
            1. Download `${{ env.ARTIFACT }}.apk` below.
            2. Open it — allow "install unknown apps" if asked, then tap Install.
            3. If Play Protect warns, tap **More details → Install anyway**.
          files: ${{ env.ARTIFACT }}.apk
