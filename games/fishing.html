<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#08293f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Math Fishing</title>
<style>
  :root{
    --deep:#08293f; --mid:#12658a; --surface:#43c7d8;
    --sand:#fdf4e3; --ink:#0a2a43;
    --coral:#ff8a3d; --good:#5ad67d; --bad:#ff5b6e; --gold:#ffd24a;
    --panel-shadow:0 8px 0 rgba(4,24,38,.28), 0 14px 30px rgba(4,24,38,.35);
    --font:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:var(--font);
    background:var(--deep);
    color:var(--sand);
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  #game{position:fixed;inset:0;overflow:hidden}
  #sea{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}

  /* ---------- HUD ---------- */
  #hud{
    position:absolute;top:0;left:0;right:0;z-index:5;
    padding:clamp(8px,2.2vw,16px);
    padding-top:max(clamp(8px,2.2vw,16px), env(safe-area-inset-top));
    display:flex;flex-direction:column;gap:clamp(8px,1.6vw,14px);
    pointer-events:none;
  }
  .statbar{display:flex;align-items:center;gap:clamp(6px,1.4vw,10px);flex-wrap:wrap}
  .chip{
    display:flex;align-items:center;gap:6px;
    background:rgba(8,41,63,.55);
    border:2px solid rgba(255,255,255,.18);
    border-radius:999px;
    padding:clamp(5px,1.2vw,8px) clamp(10px,2vw,15px);
    font-weight:700;font-size:clamp(12px,3vw,16px);
    line-height:1;backdrop-filter:blur(3px);
    font-variant-numeric:tabular-nums;
  }
  .chip .label{opacity:.7;font-size:.78em;text-transform:uppercase;letter-spacing:.06em}
  .chip.coins{color:var(--gold)}
  .chip .coin-dot{width:.85em;height:.85em;border-radius:50%;background:var(--gold);
    box-shadow:inset -2px -2px 0 rgba(0,0,0,.18)}
  .spacer{flex:1 1 auto;min-width:2px}
  .lives{display:flex;gap:3px;font-size:clamp(16px,4vw,22px);line-height:1}
  .life{filter:drop-shadow(0 2px 0 rgba(4,24,38,.4))}
  .life.lost{opacity:.28;filter:grayscale(1)}
  #mute{
    pointer-events:auto;cursor:pointer;
    background:rgba(8,41,63,.55);border:2px solid rgba(255,255,255,.18);
    color:var(--sand);border-radius:999px;width:clamp(34px,8vw,42px);height:clamp(34px,8vw,42px);
    font-size:clamp(15px,4vw,20px);display:grid;place-items:center;
  }

  .equation{
    align-self:center;
    background:var(--sand);color:var(--ink);
    border-radius:20px;
    padding:clamp(8px,1.8vw,14px) clamp(18px,5vw,40px);
    box-shadow:var(--panel-shadow);
    font-weight:800;
    font-size:clamp(26px,8.5vw,52px);
    line-height:1.05;letter-spacing:.01em;
    font-variant-numeric:tabular-nums;
    text-align:center;
    border:3px solid rgba(10,42,67,.15);
    transition:transform .1s;
  }
  .equation .qm{color:var(--coral)}
  .equation.flash-bad{animation:flashBad .45s}
  .equation.flash-good{animation:flashGood .4s}
  @keyframes flashBad{
    0%,100%{background:var(--sand)} 30%{background:#ffd8dc;transform:translateX(-6px)}
    60%{transform:translateX(6px)}
  }
  @keyframes flashGood{0%,100%{background:var(--sand)}40%{background:#d8f6e2}}

  /* ---------- Toast ---------- */
  #toast{
    position:absolute;left:50%;top:38%;z-index:6;
    transform:translate(-50%,-50%);
    pointer-events:none;text-align:center;
    font-weight:800;font-size:clamp(30px,10vw,64px);
    color:var(--gold);text-shadow:0 4px 0 rgba(4,24,38,.5);
    opacity:0;
  }
  #toast.show{animation:pop 1.1s ease-out}
  @keyframes pop{
    0%{opacity:0;transform:translate(-50%,-30%) scale(.4)}
    25%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
    70%{opacity:1;transform:translate(-50%,-52%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-70%) scale(.95)}
  }

  /* ---------- Overlay screens ---------- */
  .overlay{
    position:absolute;inset:0;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(14px,3vw,22px);
    padding:clamp(16px,5vw,40px);
    background:radial-gradient(120% 90% at 50% -10%, rgba(67,199,216,.35), rgba(8,41,63,.82) 70%);
    text-align:center;
  }
  .overlay.hidden{display:none}
  .title{
    font-size:clamp(38px,12vw,88px);font-weight:800;line-height:.95;
    text-shadow:0 5px 0 rgba(4,24,38,.55);margin:0;
    text-wrap:balance;
  }
  .title .fish-emoji{filter:drop-shadow(0 4px 0 rgba(4,24,38,.4))}
  .tagline{font-size:clamp(15px,4vw,22px);max-width:26ch;opacity:.92;text-wrap:balance;margin:0}
  .how{
    background:rgba(8,41,63,.4);border:2px solid rgba(255,255,255,.16);
    border-radius:16px;padding:clamp(10px,2.5vw,16px) clamp(14px,3.5vw,22px);
    max-width:30ch;font-size:clamp(13px,3.4vw,16px);opacity:.95;line-height:1.4;
  }
  .grade-label{font-size:clamp(13px,3.4vw,16px);text-transform:uppercase;letter-spacing:.1em;opacity:.8;margin-bottom:-6px}
  .grades{display:flex;flex-wrap:wrap;gap:clamp(6px,2vw,10px);justify-content:center;max-width:340px}
  .grade-btn{
    cursor:pointer;font-family:var(--font);font-weight:800;
    font-size:clamp(15px,4.2vw,20px);
    min-width:clamp(46px,13vw,60px);
    padding:clamp(8px,2vw,12px) clamp(6px,2vw,10px);
    border-radius:14px;border:3px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.08);color:var(--sand);
    transition:transform .08s, background .15s, border-color .15s;
  }
  .grade-btn small{display:block;font-size:.62em;font-weight:600;opacity:.7;letter-spacing:.02em}
  .grade-btn.sel{background:var(--sand);color:var(--ink);border-color:#fff;transform:translateY(-2px)}
  .grade-btn:active{transform:translateY(1px)}
  .btn-play{
    cursor:pointer;font-family:var(--font);font-weight:800;
    font-size:clamp(20px,6vw,30px);
    padding:clamp(12px,3vw,18px) clamp(34px,9vw,60px);
    border-radius:999px;border:none;
    background:var(--coral);color:#fff;
    box-shadow:0 6px 0 #c9591c, 0 12px 24px rgba(0,0,0,.3);
    transition:transform .08s, box-shadow .08s;
  }
  .btn-play:active{transform:translateY(4px);box-shadow:0 2px 0 #c9591c, 0 6px 12px rgba(0,0,0,.3)}
  .final-stats{display:flex;gap:clamp(18px,6vw,44px);justify-content:center}
  .final-stats .fs{display:flex;flex-direction:column;gap:2px}
  .final-stats .fs b{font-size:clamp(30px,9vw,50px);font-variant-numeric:tabular-nums}
  .final-stats .fs span{font-size:clamp(12px,3.2vw,15px);text-transform:uppercase;letter-spacing:.08em;opacity:.75}
  .final-stats .fs.coins b{color:var(--gold)}
  .best-note{font-size:clamp(13px,3.6vw,17px);opacity:.9}
  .best-note.new{color:var(--gold);font-weight:800}

  @media (prefers-reduced-motion:reduce){
    #toast.show,.equation.flash-bad,.equation.flash-good{animation-duration:.01ms}
  }
</style>
</head>
<body>
<div id="game">
  <canvas id="sea"></canvas>

  <div id="hud" class="hidden" aria-hidden="true">
    <div class="statbar">
      <div class="chip grade"><span class="label">Grade</span><span id="gradeVal">1</span></div>
      <div class="chip level"><span class="label">Lv</span><span id="levelVal">1</span></div>
      <div class="spacer"></div>
      <div class="chip score"><span class="label">Score</span><span id="scoreVal">0</span></div>
      <div class="chip coins"><span class="coin-dot"></span><span id="coinVal">0</span></div>
      <div class="lives" id="lives"></div>
      <button id="mute" title="Sound on/off">🔊</button>
    </div>
    <div class="equation" id="equation"><span id="eqText">3 + 5</span> = <span class="qm">?</span></div>
  </div>

  <div id="toast"></div>

  <!-- Start screen -->
  <div class="overlay" id="startScreen">
    <h1 class="title">Math <span class="fish-emoji">🐟</span> Fishing</h1>
    <p class="tagline">Solve the problem, then reel in the fish with the correct answer!</p>
    <div class="grade-label">Choose your level</div>
    <div class="grades" id="gradePicker"></div>
    <div class="how">Tap a fish to cast your hook. Right answer = coins &amp; points. Miss and you lose a heart — you get 3!</div>
    <button class="btn-play" id="playBtn">Cast Off!</button>
  </div>

  <!-- Game over screen -->
  <div class="overlay hidden" id="overScreen">
    <h1 class="title">Nice Fishing!</h1>
    <div class="final-stats">
      <div class="fs"><b id="finalScore">0</b><span>Score</span></div>
      <div class="fs coins"><b id="finalCoins">0</b><span>Coins</span></div>
      <div class="fs"><b id="finalCatch">0</b><span>Caught</span></div>
    </div>
    <p class="best-note" id="bestNote"></p>
    <button class="btn-play" id="againBtn">Play Again</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  // ---------- Canvas setup ----------
  const canvas = document.getElementById('sea');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1;

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    updatePlayBand();
  }

  // Region where fish are allowed to swim (below the HUD).
  let playTop = 120, playBottom = 0;
  function updatePlayBand(){
    const hud = document.getElementById('hud');
    const hudH = hud.classList.contains('hidden') ? H * 0.2 : hud.getBoundingClientRect().bottom;
    playTop = Math.min(hudH + 24, H * 0.42);
    playBottom = H - 30;
  }
  window.addEventListener('resize', resize);

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- Sound (tiny WebAudio blips) ----------
  let audioCtx = null, muted = false;
  function initAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
  function beep(freqs, dur, type){
    if(muted || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    freqs.forEach((f,i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'sine'; o.frequency.value = f;
      const start = t0 + i*0.06;
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(0.22, start+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, start+dur);
      o.start(start); o.stop(start+dur+0.02);
    });
  }
  const sfx = {
    good: () => beep([523,659,784], 0.18, 'triangle'),
    coin: () => beep([988,1319], 0.12, 'square'),
    bad:  () => beep([196,150], 0.22, 'sawtooth'),
    level:() => beep([523,659,784,1047], 0.2, 'triangle'),
  };

  // ---------- Grade config ----------
  const GRADES = {
    K: { label:'Kinder', num:5, ops:['+'] },
    1: { label:'Grade 1', num:5, ops:['+','-'] },
    2: { label:'Grade 2', num:6, ops:['+','-'] },
    3: { label:'Grade 3', num:6, ops:['+','-','×'] },
    4: { label:'Grade 4', num:7, ops:['+','-','×','÷'] },
    5: { label:'Grade 5', num:7, ops:['×','÷'] },
  };
  let grade = '1';

  const ri = (min,max) => min + Math.floor(Math.random()*(max-min+1));
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];

  // Build a problem sized to the chosen grade.
  function makeProblem(){
    const cfg = GRADES[grade];
    const op = pick(cfg.ops);
    let a,b,answer,text;
    if(op === '+'){
      if(grade==='K'){ a=ri(1,5); b=ri(1,5); }
      else if(grade==='1'){ a=ri(1,9); b=ri(0,10-a); }
      else { const cap = grade==='2'?20:50; a=ri(1,cap-1); b=ri(0,cap-a); }
      answer = a+b; text = `${a} + ${b}`;
    } else if(op === '-'){
      const cap = grade==='1'?10:(grade==='2'?20:60);
      a = ri(1,cap); b = ri(0,a); answer = a-b; text = `${a} − ${b}`;
    } else if(op === '×'){
      const hi = grade==='3'?9:(grade==='4'?11:12);
      a = ri(2,hi); b = ri(2,hi); answer = a*b; text = `${a} × ${b}`;
    } else { // ÷  (always exact)
      const hi = grade==='4'?10:12;
      b = ri(2,hi); const q = ri(2,hi); a = b*q; answer = q; text = `${a} ÷ ${b}`;
    }
    return { text, answer };
  }
  let problem = makeProblem();

  // Distinct candidate values that always contain the answer once.
  function generateValues(answer, count){
    const vals = [answer];
    const spread = Math.max(4, Math.round(Math.abs(answer)*0.6)+2);
    let guard = 0;
    while(vals.length < count && guard++ < 600){
      let d = answer + (ri(0, 2*spread) - spread);
      if(d < 0) d = -d;
      if(!vals.includes(d)) vals.push(d);
    }
    let n = 0;
    while(vals.length < count){ if(!vals.includes(n)) vals.push(n); n++; }
    return shuffle(vals);
  }
  function distractorValue(){
    let d, g=0;
    do { d = problem.answer + (ri(0,10)-5); } while((d===problem.answer || d<0) && g++<40);
    if(d<0) d = problem.answer + 1;
    return d;
  }
  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  // ---------- Game state ----------
  const FISH_COLORS = ['#ff8a3d','#ff6f9c','#ffd24a','#5ad67d','#8f8bff','#4fd1e0','#ff5b6e','#7ee0a1'];
  let fish = [];
  let bubbles = [];
  let coins = [];         // coin-burst particles
  let hook = null;
  let running = false;
  let score = 0, coinCount = 0, caught = 0, lives = 3, level = 1, streak = 0;
  let shake = 0;
  let best = 0;
  try { best = parseInt(localStorage.getItem('mathfishing_best')||'0',10) || 0; } catch(e){}

  function baseSpeed(){ return 0.35 + (level-1)*0.045; }

  function sizeForValue(v){
    const digits = String(Math.abs(v)).length;
    return 24 + (digits-1)*7;
  }

  function spawnFish(fromEdge){
    const dir = Math.random()<0.5 ? -1 : 1;
    const r = 30;
    const y = playTop + Math.random()*(playBottom - playTop);
    const x = fromEdge ? (dir>0 ? -60 : W+60) : Math.random()*W;
    const sp = baseSpeed() * (0.7 + Math.random()*0.6);
    return {
      x, y, r, value:0, color: pick(FISH_COLORS),
      vx: dir*sp, baseVx: dir*sp,
      wob: Math.random()*Math.PI*2,
      state:'swim',      // swim | reeling
      pop:0,             // scale pop timer when value changes
    };
  }

  function setFishValue(f, v){ f.value = v; f.r = sizeForValue(v); f.pop = 1; }

  // Distribute answer + distractors across all fish (optionally excluding one).
  function assignNumbers(exclude){
    const list = fish.filter(f => f !== exclude && f.state === 'swim');
    if(list.length === 0) return;
    const vals = generateValues(problem.answer, list.length);
    list.forEach((f,i) => setFishValue(f, vals[i]));
  }

  function newFleet(){
    const n = GRADES[grade].num;
    fish = [];
    for(let i=0;i<n;i++){ const f = spawnFish(false); fish.push(f); }
    assignNumbers(null);
  }

  function makeBubbles(){
    bubbles = [];
    const n = reduceMotion ? 12 : 30;
    for(let i=0;i<n;i++){
      bubbles.push({ x:Math.random()*W, y:Math.random()*H, r:2+Math.random()*5, sp:0.15+Math.random()*0.5 });
    }
  }

  // ---------- Hook ----------
  function idleHook(){ return { x:W/2, y:playTop-10, tx:W/2, ty:playTop-10, state:'idle', fish:null, bob:0 }; }

  function tryCast(f){
    if(!hook || hook.state !== 'idle') return;
    hook.fish = f;
    hook.tx = f.x; hook.ty = f.y;
    hook.state = 'casting';
  }

  // ---------- Round outcome ----------
  function onCorrect(f){
    score += 10 + streak*2;
    streak += 1;
    caught += 1;
    const reward = 1 + Math.min(4, streak);
    coinCount += reward;
    sfx.good(); sfx.coin();
    flashEq('flash-good');
    burstCoins(f.x, f.y, reward);
    // Advance to a fresh problem and renumber the remaining fish.
    problem = makeProblem();
    assignNumbers(f);
    updateHUD();
    // Level up every 5 catches.
    const newLevel = Math.floor(caught/5) + 1;
    if(newLevel > level){ level = newLevel; showToast('Level '+level+'!'); sfx.level(); fish.forEach(fx=>{ if(fx.state==='swim'){ const s=baseSpeed(); fx.vx = Math.sign(fx.vx)*s*(0.7+Math.random()*0.6); fx.baseVx=fx.vx; } }); }
    else if(streak>=3){ showToast(streak+' streak!'); }
  }

  function onWrong(f){
    streak = 0;
    lives -= 1;
    sfx.bad();
    flashEq('flash-bad');
    if(!reduceMotion) shake = 12;
    // Fish darts away.
    f.vx = Math.sign(f.vx || 1) * (baseSpeed()+2.2);
    f.baseVx = f.vx;
    updateHUD();
    if(lives <= 0) endGame();
  }

  function burstCoins(x,y,n){
    for(let i=0;i<n*3;i++){
      const a = Math.random()*Math.PI*2, s = 1+Math.random()*3;
      coins.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1.5, life:1, r:3+Math.random()*3 });
    }
  }

  // ---------- Update ----------
  function update(dtf){
    // Bubbles
    for(const b of bubbles){
      b.y -= b.sp*dtf; b.x += Math.sin(b.y*0.02)*0.2*dtf;
      if(b.y < -10){ b.y = H+10; b.x = Math.random()*W; }
    }
    // Coin particles
    for(const c of coins){ c.vy += 0.12*dtf; c.x += c.vx*dtf; c.y += c.vy*dtf; c.life -= 0.02*dtf; }
    coins = coins.filter(c => c.life > 0);

    // Fish
    for(const f of fish){
      if(f.pop > 0) f.pop = Math.max(0, f.pop - 0.05*dtf);
      if(f.state === 'reeling'){
        // Follow the hook up to the surface.
        f.x += (hook.x - f.x)*0.25*dtf;
        f.y += (hook.y - f.y)*0.25*dtf;
        continue;
      }
      f.wob += 0.05*dtf;
      f.x += f.vx*dtf;
      f.y += Math.sin(f.wob)*0.35*dtf;
      // ease darting fish back to normal speed
      if(Math.abs(f.vx) > Math.abs(f.baseVx)+0.01){ f.vx *= Math.pow(0.985, dtf); }
      // keep in vertical band
      if(f.y < playTop){ f.y = playTop; } if(f.y > playBottom){ f.y = playBottom; }
      // wrap and respawn on the far edge
      if(f.vx < 0 && f.x < -80){ respawn(f, 1); }
      else if(f.vx > 0 && f.x > W+80){ respawn(f, -1); }
    }

    // Hook
    if(hook){
      if(hook.state === 'idle'){
        hook.bob += 0.06*dtf;
        hook.x = W/2; hook.ty = (playTop-10) + Math.sin(hook.bob)*4;
        hook.y += (hook.ty - hook.y)*0.1*dtf;
      } else if(hook.state === 'casting'){
        const f = hook.fish;
        hook.tx = f.x; hook.ty = f.y;
        hook.x += (hook.tx - hook.x)*0.28*dtf;
        hook.y += (hook.ty - hook.y)*0.28*dtf;
        if(Math.hypot(hook.x-f.x, hook.y-f.y) < f.r*0.7 + 6){
          const correct = (f.value === problem.answer);
          if(correct){ f.state='reeling'; hook.state='reeling'; onCorrect(f); }
          else { hook.state='returning'; onWrong(f); }
        }
      } else if(hook.state === 'reeling'){
        hook.x += (W/2 - hook.x)*0.14*dtf;
        hook.y += ((playTop-30) - hook.y)*0.14*dtf;
        if(hook.y < playTop-20){
          // landed the catch: send fish back into the sea as a plain distractor
          const f = hook.fish;
          if(f){ Object.assign(f, spawnFish(true)); setFishValue(f, distractorValue()); f.state='swim'; }
          hook.fish = null; hook.state='returning';
        }
      } else if(hook.state === 'returning'){
        hook.x += (W/2 - hook.x)*0.16*dtf;
        hook.y += ((playTop-10) - hook.y)*0.16*dtf;
        if(Math.hypot(hook.x-W/2, hook.y-(playTop-10)) < 6){ hook.state='idle'; }
      }
    }

    if(shake > 0) shake = Math.max(0, shake - 0.6*dtf);
  }

  function respawn(f, dir){
    f.x = dir>0 ? -60 : W+60;
    f.y = playTop + Math.random()*(playBottom-playTop);
    const s = baseSpeed()*(0.7+Math.random()*0.6);
    f.vx = dir*s; f.baseVx = f.vx;
    // if this fish held the answer, hand it a fresh number so the answer stays on screen
    if(f.value === problem.answer && !fish.some(o=>o!==f && o.state==='swim' && o.value===problem.answer)){
      // keep answer present: give a neighbouring fish the answer, this one a distractor
      const other = fish.find(o=>o!==f && o.state==='swim');
      if(other) setFishValue(other, problem.answer);
      setFishValue(f, distractorValue());
    }
  }

  // ---------- Render ----------
  function drawBackground(){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#43c7d8'); g.addColorStop(0.35, '#12658a'); g.addColorStop(1, '#08293f');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    // light rays
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const t = reduceMotion ? 0 : perfNow*0.00004;
    for(let i=0;i<4;i++){
      const cx = W*(0.2+i*0.22) + Math.sin(t+i)*W*0.04;
      ctx.fillStyle = 'rgba(180,240,255,0.05)';
      ctx.beginPath();
      ctx.moveTo(cx, 0); ctx.lineTo(cx+70, 0);
      ctx.lineTo(cx+220, H); ctx.lineTo(cx+40, H);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    // bubbles
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    for(const b of bubbles){ ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill(); }
    // sea floor
    ctx.fillStyle = 'rgba(6,20,32,0.55)';
    ctx.beginPath();
    ctx.moveTo(0,H); ctx.lineTo(0,H-26);
    for(let x=0;x<=W;x+=60){ ctx.quadraticCurveTo(x+30,H-46,x+60,H-26); }
    ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  }

  function drawFish(f){
    const scale = 1 + f.pop*0.25;
    const r = f.r;
    ctx.save();
    ctx.translate(f.x, f.y);
    // body + tail (flipped to face travel direction)
    ctx.save();
    ctx.scale((f.vx<0?-1:1)*scale, scale);
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.moveTo(-r*0.85,0); ctx.lineTo(-r*1.55,-r*0.62); ctx.lineTo(-r*1.55,r*0.62);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0,0,r*1.25,r*0.9,0,0,Math.PI*2); ctx.fill();
    // top fin
    ctx.beginPath();
    ctx.moveTo(-r*0.2,-r*0.8); ctx.quadraticCurveTo(r*0.2,-r*1.3,r*0.5,-r*0.7);
    ctx.closePath(); ctx.fill();
    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(r*0.75,-r*0.28,r*0.22,0,7); ctx.fill();
    ctx.fillStyle = '#0a2a43';
    ctx.beginPath(); ctx.arc(r*0.82,-r*0.28,r*0.11,0,7); ctx.fill();
    ctx.restore();
    // number, always upright
    const fs = Math.round(r*0.95*scale);
    ctx.font = '800 '+fs+'px '+getComputedStyle(document.body).fontFamily;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth = Math.max(3, fs*0.16); ctx.strokeStyle='rgba(8,30,48,0.85)';
    ctx.strokeText(f.value, 0, 1);
    ctx.fillStyle = '#fff';
    ctx.fillText(f.value, 0, 1);
    ctx.restore();
  }

  function drawHook(){
    if(!hook) return;
    ctx.strokeStyle = 'rgba(240,250,255,0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2, -4); ctx.lineTo(hook.x, hook.y); ctx.stroke();
    // hook shape
    ctx.save();
    ctx.translate(hook.x, hook.y);
    ctx.strokeStyle = '#e9eef2'; ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(0,-8); ctx.lineTo(0,4);
    ctx.arc(-5,4,5,0,Math.PI,false);
    ctx.stroke();
    ctx.restore();
  }

  function drawCoins(){
    for(const c of coins){
      ctx.globalAlpha = Math.max(0,c.life);
      ctx.fillStyle = '#ffd24a';
      ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,7); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.6)';
      ctx.beginPath(); ctx.arc(c.x-c.r*0.3,c.y-c.r*0.3,c.r*0.35,0,7); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function render(){
    ctx.save();
    if(shake>0){ ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); }
    drawBackground();
    // draw swimming fish first, then the reeled fish on top of the hook
    for(const f of fish){ if(f.state!=='reeling') drawFish(f); }
    drawHook();
    for(const f of fish){ if(f.state==='reeling') drawFish(f); }
    drawCoins();
    ctx.restore();
  }

  // ---------- Loop ----------
  let last = 0, perfNow = 0;
  function loop(ts){
    perfNow = ts;
    let dt = last ? ts - last : 16;
    last = ts;
    dt = Math.min(dt, 50);
    const dtf = dt/16;               // ~1 at 60fps
    if(running) update(dtf);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- Input ----------
  canvas.addEventListener('pointerdown', (e) => {
    if(!running) return;
    const mx = e.clientX, my = e.clientY;
    // find topmost fish under the tap
    let hit = null, bestD = Infinity;
    for(const f of fish){
      if(f.state!=='swim') continue;
      const d = Math.hypot(mx-f.x, my-f.y);
      if(d < f.r*1.3 && d < bestD){ bestD = d; hit = f; }
    }
    if(hit) tryCast(hit);
  });

  // ---------- HUD ----------
  const el = id => document.getElementById(id);
  function updateHUD(){
    el('scoreVal').textContent = score;
    el('coinVal').textContent = coinCount;
    el('levelVal').textContent = level;
    el('gradeVal').textContent = grade;
    el('eqText').textContent = problem.text;
    const lc = el('lives');
    lc.innerHTML = '';
    for(let i=0;i<3;i++){
      const s = document.createElement('span');
      s.className = 'life' + (i>=lives?' lost':'');
      s.textContent = i<lives ? '❤️' : '🤍';
      lc.appendChild(s);
    }
  }
  function flashEq(cls){
    const eq = el('equation');
    eq.classList.remove('flash-good','flash-bad');
    void eq.offsetWidth;
    eq.classList.add(cls);
  }
  function showToast(txt){
    const t = el('toast');
    t.textContent = txt;
    t.classList.remove('show'); void t.offsetWidth; t.classList.add('show');
  }

  // ---------- Screens ----------
  function buildGradePicker(){
    const p = el('gradePicker');
    p.innerHTML = '';
    Object.keys(GRADES).forEach(key => {
      const b = document.createElement('button');
      b.className = 'grade-btn' + (key===grade?' sel':'');
      b.innerHTML = (key==='K'?'K':'G'+key) + '<small>'+GRADES[key].label+'</small>';
      b.addEventListener('click', () => {
        grade = key;
        [...p.children].forEach(c=>c.classList.remove('sel'));
        b.classList.add('sel');
      });
      p.appendChild(b);
    });
  }

  function startGame(){
    initAudio();
    score=0; coinCount=0; caught=0; lives=3; level=1; streak=0; shake=0;
    problem = makeProblem();
    el('startScreen').classList.add('hidden');
    el('overScreen').classList.add('hidden');
    el('hud').classList.remove('hidden');
    el('hud').setAttribute('aria-hidden','false');
    updatePlayBand();
    makeBubbles();
    newFleet();
    hook = idleHook();
    updateHUD();
    running = true;
  }

  function endGame(){
    running = false;
    el('hud').classList.add('hidden');
    el('finalScore').textContent = score;
    el('finalCoins').textContent = coinCount;
    el('finalCatch').textContent = caught;
    const note = el('bestNote');
    if(score > best){
      best = score;
      try{ localStorage.setItem('mathfishing_best', String(best)); }catch(e){}
      note.textContent = '🏆 New best score!';
      note.classList.add('new');
    } else {
      note.textContent = 'Best score: ' + best;
      note.classList.remove('new');
    }
    setTimeout(()=> el('overScreen').classList.remove('hidden'), 400);
  }

  el('mute').addEventListener('click', () => {
    muted = !muted;
    el('mute').textContent = muted ? '🔇' : '🔊';
  });
  el('playBtn').addEventListener('click', startGame);
  el('againBtn').addEventListener('click', () => {
    el('overScreen').classList.add('hidden');
    el('startScreen').classList.remove('hidden');
    buildGradePicker();
  });

  // ---------- Boot ----------
  resize();
  buildGradePicker();
  makeBubbles();
})();
</script>
</body>
</html>
